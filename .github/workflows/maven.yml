name: Java CI

# Inclure candidate-starter : souvent la branche par défaut des repos créés depuis Classroom.
on:
  push:
    branches: [main, candidate-starter]
  pull_request:
    branches: [main, candidate-starter]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run tests
        run: mvn -B verify
